name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Run unit tests
        run: pnpm test:unit

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test data directory
        run: |
          mkdir -p ~/.hermes/sessions
          mkdir -p ~/.hermes/logs
          # Create minimal notification_channels.json for testing
          cat > ~/.hermes/notification_channels.json << 'EOF'
          {
            "version": 1,
            "channels": [
              {
                "id": "test-channel",
                "name": "Test Channel",
                "platform": "discord",
                "channel_id": "123456789",
                "events": ["*"],
                "enabled": true
              }
            ],
            "event_types": {
              "critical": ["system_down", "gateway_failed"],
              "error": ["api_error", "task_failed"],
              "warning": ["budget_warning", "rate_limit"],
              "info": ["task_complete", "cron_complete"]
            }
          }
          EOF
          # Create empty notification_history.json
          cat > ~/.hermes/notification_history.json << 'EOF'
          []
          EOF
        
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        
      - name: Run E2E tests
        run: pnpm test:e2e
        
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
